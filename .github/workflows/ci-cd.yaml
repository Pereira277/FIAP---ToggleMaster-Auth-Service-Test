name: CI/CD Auth Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ESTÁGIO 1: Build & Test
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - name: Instalar Dependências
        run: go mod download

      - name: Compilar Aplicação
        run: go build -o auth-service .

      - name: Testes Unitários
        run: |
          echo "Nenhum teste unitário detectado no repositório."
          echo "Build validado. Avançando para Linter e Segurança..."

  # ESTÁGIO 2: DevSecOps (Linter, SAST e SCA)
  security-and-lint:
    name: Linter & Security Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - name: Linter (golangci-lint)
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest

      - name: SAST (Gosec)
        uses: securego/gosec@master
        with:
          args: '-severity high ./...'

      - name: SCA (Trivy Filesystem)
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  # ESTÁGIO 3: Docker, Scan e Push
  docker-build-and-scan:
    name: Docker Build, Scan & Push
    needs: security-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da Imagem Docker local
        run: docker build -t auth-service:${{ github.sha }} .

      - name: Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'auth-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      # --- INTEGRAÇÃO COM AWS ECR ---
      - name: Configurar credenciais da AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push da Imagem para o ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: auth-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 1. Renomeia a imagem local para o formato exigido pela AWS
          docker tag auth-service:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag auth-service:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # 2. Envia as imagens para o ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest